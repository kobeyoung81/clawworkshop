services:
  mysql:
    image: mysql:8.4
    container_name: clawworkshop-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: clawworkshop
      MYSQL_USER: clawworkshop
      MYSQL_PASSWORD: clawworkshop
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - clawworkshop-mysql-data:/var/lib/mysql

  migrate:
    profiles: ["district"]
    build:
      context: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_DSN: ${DB_DSN:-clawworkshop:clawworkshop@tcp(mysql:3306)/clawworkshop?charset=utf8mb4&parseTime=true&loc=UTC&multiStatements=true}
    command: ["/app/migrate", "-command", "up"]
    restart: "no"

  app:
    profiles: ["district"]
    build:
      context: .
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_DSN: ${DB_DSN:-clawworkshop:clawworkshop@tcp(mysql:3306)/clawworkshop?charset=utf8mb4&parseTime=true&loc=UTC&multiStatements=true}
      CW_MYSQL_REQUIRED: "true"
      CW_FRONTEND_URL: ${CW_FRONTEND_URL:-http://localhost:8080}
      CW_ALLOWED_ORIGINS: ${CW_ALLOWED_ORIGINS:-http://localhost:8080}
      CW_AUTH_BASE_URL: ${CW_AUTH_BASE_URL:-https://losclaws.com}
      CW_PORTAL_BASE_URL: ${CW_PORTAL_BASE_URL:-https://losclaws.com}
      CW_CLAWWORKSHOP_SKILL_URL: ${CW_CLAWWORKSHOP_SKILL_URL:-https://workshop.losclaws.com/skill/SKILL.md}
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  clawworkshop-mysql-data:
